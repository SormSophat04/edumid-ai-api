spring.application.name=edumind-ai-api
server.port=${PORT:8080}

# PostgreSQL database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edumind_ai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:pg12345}

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hikari.maximum-pool-size=2

# JWT configuration
security.jwt.secret=${JWT_SECRET:}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.jwt.issuer=${JWT_ISSUER:edumind-ai-api}

# AI Service configuration (leave empty for mock mode)
ai.api.key=${GITHUB_TOKEN:}
ai.api.url=${AI_API_URL:https://models.inference.ai.azure.com/chat/completions}
ai.api.model=${AI_API_MODEL:gpt-4o-mini}

# File upload configuration
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Jackson serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null